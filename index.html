<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DIMAMID</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Monoton&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <div class="bg-image"></div>
  <div class="bg-overlay"></div>

  <!-- slogan sits behind the canvas (astronaut covers it) -->
  <div class="slogan">Always wondering why</div>

  <!-- logo floats up into the top center on page load -->
  <img class="logo" src="./assets/images/logo.svg" alt="DIMAMID" />

  <!-- film grain overlay sits on top of canvas, below cursor -->
  <div class="grain"></div>

  <!-- HUD: technical text, types in on page load, live mission clock -->
  <div class="hud hud--tl">
    <div class="hud__line" data-typewriter="// SIGNAL ESTABLISHED"></div>
    <div class="hud__line">
      <span class="hud__label" data-typewriter="T+&nbsp;"></span><span data-clock>00:00:00:00</span>
    </div>
    <div class="hud__line" data-typewriter="LAT 47.6062° // LON -122.3321°"></div>
    <div class="hud__line" data-typewriter="ENV NOMINAL"></div>
  </div>

  <!-- custom cursor: small dot follows instantly, ring lags slightly -->
  <div class="cursor-dot"></div>
  <div class="cursor-ring"></div>

  <script type="module" src="./main.js"></script>
</body>
</html>
